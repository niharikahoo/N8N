<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Frontend App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    .card {
      padding: 3rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    p { opacity: 0.85; margin-bottom: 1.5rem; }
    button {
      padding: 0.75rem 1.75rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #fff;
      color: #667eea;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25); }
    #count { font-weight: 700; }
    .counter { margin-top: 1.5rem; font-size: 1.1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello, World</h1>
    <p>A tiny frontend deployed via n8n &rarr; GitHub PR</p>
    <button id="btn">Click me</button>
    <div class="counter">Clicks: <span id="count">0</span></div>
  </div>
  <script>
    let n = 0;
    document.getElementById('btn').addEventListener('click', () => {
      n += 1;
      document.getElementById('count').textContent = n;
    });
  </script>
</body>
</html>
